{% extends "base.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}
    <section class="window form-window">
        <div class="window-title">Регистрация</div>
        <div class="window-body">
            <form method="post" class="win-form">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="form-actions">
                    <button type="submit">Зарегистрироваться</button>
                    <a href="{% url 'login' %}" class="button-link">Уже есть аккаунт</a>
                </div>
            </form>
        </div>
    </section>
{% endblock %}
